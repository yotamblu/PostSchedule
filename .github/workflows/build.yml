name: Build Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download Playwright Chromium
        run: npm run pack:browsers
        env:
          PLAYWRIGHT_BROWSERS_PATH: ./playwright-browsers

      - name: Build Vite UI
        run: npm run build

      - name: Package with electron-builder
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: PostSchedule-Windows
          path: out/*.exe
          retention-days: 30

  build-mac:
    name: macOS (.dmg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download Playwright Chromium
        run: npm run pack:browsers
        env:
          PLAYWRIGHT_BROWSERS_PATH: ./playwright-browsers

      - name: Build Vite UI
        run: npm run build

      - name: Package with electron-builder
        run: npx electron-builder --mac --x64 --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: PostSchedule-macOS
          path: out/*.dmg
          retention-days: 30
