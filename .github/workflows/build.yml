name: Build Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Download Playwright Chromium
        run: npm run pack:browsers
        env:
          PLAYWRIGHT_BROWSERS_PATH: ./playwright-browsers

      - name: Build Vite UI
        run: npm run build

      - name: Package with electron-builder
        run: npx electron-builder --win --x64 --publish never

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: PostSchedule-Windows
          path: out/*.exe
          retention-days: 30

  build-mac-arm64:
    name: macOS arm64 (.dmg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Download Playwright Chromium
        run: npm run pack:browsers
        env:
          PLAYWRIGHT_BROWSERS_PATH: ./playwright-browsers

      - name: Build Vite UI
        run: npm run build

      - name: Package with electron-builder
        run: npx electron-builder --mac --arm64 --publish never

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: PostSchedule-macOS-arm64
          path: out/*.dmg
          retention-days: 30

  build-mac-x64:
    name: macOS x64 (.dmg)
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Download Playwright Chromium
        run: npm run pack:browsers
        env:
          PLAYWRIGHT_BROWSERS_PATH: ./playwright-browsers

      - name: Build Vite UI
        run: npm run build

      - name: Package with electron-builder
        run: npx electron-builder --mac --x64 --publish never

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: PostSchedule-macOS-x64
          path: out/*.dmg
          retention-days: 30
